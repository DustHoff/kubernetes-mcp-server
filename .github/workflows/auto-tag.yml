name: Auto Tag

# Runs on every merge to master. Bumps the patch version of the latest
# semantic version tag and pushes the new tag, which then triggers the
# Docker build-and-push job in build.yml.
#
# IMPORTANT: the tag push MUST use a Personal Access Token (PAT) stored as
# the repository secret GH_PAT. GitHub blocks workflows triggered by the
# default GITHUB_TOKEN from firing further workflows, so using GITHUB_TOKEN
# here would silently prevent build.yml from running on the new tag.
# Create a PAT with "Contents: Read and write" scope and add it as GH_PAT:
#   Repository → Settings → Secrets and variables → Actions → New secret
on:
  push:
    branches:
      - master

jobs:
  tag:
    name: Bump patch version and tag
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use PAT so the subsequent tag push triggers downstream workflows.
          token: ${{ secrets.GH_PAT }}

      - name: Compute next semantic version
        id: next_tag
        run: |
          LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$LATEST" ]; then
            NEXT="v0.1.1"
          else
            VERSION="${LATEST#v}"
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f2)
            PATCH=$(echo "$VERSION" | cut -d. -f3)
            NEXT="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi
          echo "tag=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Next version: $NEXT"

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.next_tag.outputs.tag }}"
          git push origin "${{ steps.next_tag.outputs.tag }}"
