name: CI

on:
  push:
    branches:
      - master
      - "feature/**"
      - "fix/**"
    tags:
      - "*"
  pull_request:
    branches:
      - master

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ──────────────────────────────────────────
  # Job 1: Lint & Build
  # ──────────────────────────────────────────
  build:
    name: Build & Lint (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (TypeScript)
        run: npm run build

      - name: Upload dist artifact
        if: matrix.node-version == '20.x'
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ──────────────────────────────────────────
  # Job 2: Tests
  # ──────────────────────────────────────────
  test:
    name: Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Upload coverage
        if: matrix.node-version == '20.x'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  # ──────────────────────────────────────────
  # Job 3: Docker
  #
  # Steps:
  #   1. Build amd64 image locally (fast, no QEMU)
  #   2. Smoke-test: verify the server starts correctly
  #   3. On any tag push: build multi-platform (amd64 + arm64) and push to
  #      ghcr.io. The image tag matches the git tag exactly (e.g. git tag
  #      "v0.1.1" → image tag "v0.1.1"). Images are also tagged "latest".
  # ──────────────────────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [build, test]

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Step 1: build amd64 image locally for the smoke test ──────────────
      - name: Build local amd64 image (smoke test)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: false
          load: true
          tags: smoke-test:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Step 2: smoke test ────────────────────────────────────────────────
      # The MCP server prints "<name> vX.Y.Z started" to stderr on startup,
      # then blocks on stdin. Closing stdin (empty echo) triggers a clean exit.
      # We capture stderr, assert the startup line is present, and enforce a
      # 15-second timeout so the job never hangs.
      - name: Smoke test – verify server starts
        run: |
          OUTPUT=$(echo "" | timeout 15 docker run --rm -i smoke-test:latest 2>&1 || true)
          echo "--- container output ---"
          echo "$OUTPUT"
          echo "------------------------"
          echo "$OUTPUT" | grep -q "started" \
            && echo "✓ Smoke test passed" \
            || (echo "✗ Smoke test failed – 'started' not found in output" && exit 1)

      # ── Step 3 (any tag): multi-platform build + push ────────────────────
      # `type=ref,event=tag` produces a Docker tag equal to the git tag name.
      - name: Extract Docker metadata
        if: startsWith(github.ref, 'refs/tags/')
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Set up QEMU (ARM64 emulation)
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/setup-qemu-action@v3

      - name: Log in to GitHub Container Registry
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-platform image (amd64 + arm64)
        if: startsWith(github.ref, 'refs/tags/')
        id: docker_push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          echo "Pushed ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          echo "Digest: ${{ steps.docker_push.outputs.digest }}"
          echo "Tags:   ${{ steps.meta.outputs.tags }}"
